repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: .venv/bin/ruff check src/ tests/
        language: system
        pass_filenames: false
        always_run: true

      - id: ruff-format
        name: ruff format
        entry: .venv/bin/ruff format --check src/ tests/
        language: system
        pass_filenames: false
        always_run: true